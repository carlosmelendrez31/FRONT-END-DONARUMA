<div class="carrito-container">
  <h1 class="titulo-carrito">Mi Carrito de Compras</h1>

  <div class="carrito-grid">
    
    <div class="lista-productos">
      <div class="producto-card" *ngFor="let item of listaCarrito">
        
        <div class="producto-icono">
         <img [src]="item.img1 || item.imagenUrl || item.imagen || item.imagen_Url" alt="{{ item.nombre }}" class="img-perfume-carrito">
        </div> 
        
        <div class="producto-info">
          <h3>{{ item.nombre }}</h3>
          <p class="producto-cantidad">Cantidad: {{ item.cantidad }}</p>
        </div>
        
        <div class="producto-precio">
          ${{ item.precio * item.cantidad }} MXN
        </div>
      </div>
    </div>

    <div class="resumen-pedido">
      <h2>Resumen del Pedido</h2>
      
      <div class="resumen-fila">
        <span>Subtotal</span>
        <span>${{ calcularTotal() }} MXN</span>
      </div>
      <div class="resumen-fila">
        <span>Envío estándar</span>
        <span class="envio-gratis">¡Gratis!</span>
      </div>
      
      <hr class="divisor">
      
      <div class="resumen-total">
        <span>Total a pagar</span>
        <span>${{ calcularTotal() }} MXN</span>
      </div>

      <button class="btn-pagar" (click)="pagarConStripe()">
        Pagar con Stripe 💳
      </button>
      <p class="pago-seguro">🔒 Pago 100% seguro y encriptado</p>
    </div>

  </div>
</div>
