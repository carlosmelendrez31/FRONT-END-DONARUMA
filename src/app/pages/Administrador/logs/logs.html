<div class="logs-container">
  <div class="logs-header">
    <div class="logs-title">
      <h1>Auditoría y Seguridad</h1>
      <p>Monitoreo en tiempo real de los eventos del sistema.</p>
    </div>
    <button class="btn-actualizar" (click)="cargarHistorial()">
      Actualizar
    </button>
  </div>

  <div class="logs-filters">
  <div class="search-box">
    <span class="material-icons">search</span> 
    <input 
      type="text" 
      [(ngModel)]="terminoBusqueda" 
      (keyup.enter)="cargarHistorial()"
      placeholder="Buscar por correo o evento..."
    >
  </div>
    
    <select [(ngModel)]="limiteActual" (change)="cargarHistorial()" class="limit-select">
    <option [value]="50">Ver 50</option>
    <option [value]="100">Ver 100</option>
    <option [value]="200">Ver 200</option>
    <option [value]="500">Ver 500</option>
  </select>
</div>
  <div class="table-wrapper">
    <table class="logs-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha y Hora</th>
          <th>Evento</th>
          <th>Usuario</th>
          <th>Dirección IP</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of listaLogs">
          <td class="log-id">#{{ log.id }}</td>
          <td>{{ log.eventDate | date:'short':'-0700' }}</td>
          <td>
            <span class="status-badge"
                  [ngClass]="{
                    'badge-success': log.eventType.includes('Exitoso'),
                    'badge-error': log.eventType.includes('Fallido') || log.eventType.includes('Error'),
                    'badge-warning': !log.eventType.includes('Exitoso') && !log.eventType.includes('Fallido') && !log.eventType.includes('Error')
                  }">
              {{ log.eventType }}
            </span>
          </td>
          <td class="log-user">{{ log.userEmail }}</td>
          <td class="log-ip">{{ log.ipAddress }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
